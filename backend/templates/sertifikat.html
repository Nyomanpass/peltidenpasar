<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin:0; padding:0; font-family: 'Be Vietnam Pro', sans-serif; }

    .container {
      position: relative;
      width: 1123px;
      height: 794px;
    }

    .bg {
      position:absolute;
      width:100%;
      height:100%;
      object-fit: cover;
    }

  .nama {
  position:absolute;
  width:100%;
  text-align:center;
  font-weight: bold;
  letter-spacing: 1px;
}

/* SINGLE */
.nama.SINGLE {
  font-size: 36px;
  top: 365px;
}

/* DOUBLE NORMAL (PATOKAN KAMU) */
.nama.DOUBLE {
  width: 90%;
  left: 50%;
  top: 335px;
  transform: translateX(-50%);
  font-size: 28px;
  line-height: 1.3;
  word-wrap: break-word;
  white-space: pre-line;
}

/* 🔥 DOUBLE PANJANG (lebih kecil dikit) */
.nama.DOUBLE.long {
  font-size: 28px;
  top: 300px;
}

/* 🔥 DOUBLE SANGAT PANJANG */
.nama.DOUBLE.verylong {
  font-size: 24px;
  top: 300px;
}

    /* ===============================
       🔥 KETERANGAN
    =============================== */
    .ket {
      position: absolute;
      top: 471px;
      width: 100%;
      text-align: center;
      font-size: 20px;
      color: #2a4c09;
    }

    /* ===============================
       🔥 QR
    =============================== */
    .qr {
      position:absolute;
      bottom: 40px;
      right: 40px;
    }

  </style>
</head>

<body>
  <div class="container">
    <img src="{{bg}}" class="bg"/>

    <!-- 🔥 KATEGORI MASUK DI CLASS -->
    <div class="nama {{kategori}}">
      {{nama}}
    </div>

    <div class="ket">
      {{sebagai}}
    </div>

    <img src="{{qr}}" class="qr" width="90"/>
  </div>
</body>
</html>
